name: Create GitHub Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-lockfile:
    name: Verify uv.lock is current
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Check lockfile is up to date
        run: uv lock --check

  release:
    name: Create GitHub Release & Build Image
    needs: verify-lockfile
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "Disk space freed."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
            echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.tag.outputs.TAG }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.VERSION }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "⚠️ CHANGELOG.md not found, using empty notes."
            echo "NOTES=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "⚠️ No changelog entry found for version $VERSION."
            echo "NOTES=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "NOTES<<CHANGELOG_EOF"
              echo "$NOTES"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.TAG }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.NOTES }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const notes = (process.env.RELEASE_NOTES || '').trim();
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: notes || `Release ${tag}`,
              draft: false,
              prerelease: false,
            });

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/sudolulo/winnow:latest
            ghcr.io/sudolulo/winnow:${{ steps.tag.outputs.TAG }}

