[project]
name = "if-curator"
version = "0.1.0"
description = "Immich to Frigate training sets"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "sudolulo" }]
keywords = ["immich", "frigate", "face-recognition", "training-data", "arcface", "insightface"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Image Recognition",
]
dependencies = [
    "croniter>=5.0.2",
    "insightface>=0.7.3",
    "nvidia-cudnn-cu12>=9.0.0",
    "numpy>=2.2.6",
    "onnxruntime-gpu==1.20.1",
    "opencv-python-headless>=4.12.0.88",
    "pillow>=12.1.0",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
    "rich>=14.2.0",
    "torch>=2.6.0",
    "transformers>=4.57.6",
    "ultralytics>=8.3.252",
]

[project.scripts]
if-curator = "if_curator.cli:main"

[project.urls]
Repository = "https://github.com/sudolulo/if_curator_headless"

[tool.uv.sources]
torch = [
    { index = "pytorch-cu126", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" },
    { index = "pytorch-cpu", marker = "sys_platform == 'linux' and platform_machine == 'aarch64'" },
    { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9.2",
]

[tool.hatch.build.targets.wheel]
packages = ["if_curator"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

